name: iOS Smoke Tests

# ─────────────────────────────────────────────────────────────────────────────
# Runs the smoke test suite against an iOS simulator (iPhone 15 Pro / iOS 17).
#
# Triggers:
#   • Manual   — workflow_dispatch only (macOS runners are billed per minute)
#   • Nightly  — scheduled at 03:00 UTC (runs after Android at 02:00)
#
# NOTE: iOS testing requires a macOS runner. GitHub-hosted macOS runners are
# available but more expensive than ubuntu. Consider using self-hosted runners
# for frequent iOS runs.
#
# App binary:
#   Downloaded from the SauceLabs My Demo App iOS GitHub releases.
#   Override with the IOS_APP_URL repository variable for custom builds.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily

env:
  IOS_APP_URL: ${{ vars.IOS_APP_URL || 'https://github.com/saucelabs/my-demo-app-ios/releases/download/v1.0.3/SauceLabs-Demo-App.Simulator.zip' }}
  IPA_PATH:    apps/ios/SauceLabs-Demo-App.app

jobs:
  smoke-ios:
    name: Smoke — iOS 17 (iPhone 15 Pro)
    runs-on: macos-latest

    steps:
      # ── Source ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Node / Appium ────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appium 2 + XCUITest driver
        run: |
          npm install -g appium
          appium driver install xcuitest
          appium --version

      # ── App binary ──────────────────────────────────────────────────────────
      - name: Cache iOS app
        id: cache-ios-app
        uses: actions/cache@v4
        with:
          path: ${{ env.IPA_PATH }}
          key: ios-app-${{ env.IOS_APP_URL }}

      - name: Download and unpack iOS app
        if: steps.cache-ios-app.outputs.cache-hit != 'true'
        run: |
          mkdir -p apps/ios
          curl -fsSL "$IOS_APP_URL" -o apps/ios/app.zip
          unzip -q apps/ios/app.zip -d apps/ios/
          rm apps/ios/app.zip
          echo "iOS app unpacked: $(ls apps/ios/)"

      # ── iOS Simulator ────────────────────────────────────────────────────────
      - name: Boot iPhone 15 Pro simulator
        run: |
          # Find or create the simulator
          RUNTIME="com.apple.CoreSimulator.SimRuntime.iOS-17-2"
          UDID=$(xcrun simctl list devices --json \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
            if 'iOS-17' in runtime:
              for d in devices:
                if 'iPhone 15 Pro' in d['name'] and d['isAvailable']:
                  print(d['udid']); exit()
          print('')
          ")

          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl create "iPhone15ProCI" "iPhone 15 Pro" "$RUNTIME")
            echo "Created simulator: $UDID"
          else
            echo "Found simulator: $UDID"
          fi

          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID" -b
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV

      - name: Install app on simulator
        run: |
          xcrun simctl install "$SIMULATOR_UDID" "$IPA_PATH"
          echo "App installed on simulator $SIMULATOR_UDID"

      # ── CI capabilities ─────────────────────────────────────────────────────
      - name: Write CI iOS capabilities
        run: |
          python3 - <<EOF
          import yaml

          caps = {
            "capabilities": {
              "platformName":    "iOS",
              "platformVersion": "17.2",
              "deviceName":      "iPhone 15 Pro",
              "udid":            "$SIMULATOR_UDID",
              "bundleId":        "com.saucelabs.mydemoapp.ios",
              "automationName":  "XCUITest",
              "noReset":         False,
              "fullReset":       False,
              "newCommandTimeout":  300,
              "usePrebuiltWDA":     False,
              "wdaLaunchTimeout":   120000,
              "wdaConnectionTimeout": 120000,
            },
            "appium_server": {"url": "http://localhost:4723"},
          }
          with open("config/ci_ios_capabilities.yaml", "w") as f:
            yaml.dump(caps, f, default_flow_style=False)
          print("CI iOS capabilities written.")
          EOF

      # ── Start Appium ────────────────────────────────────────────────────────
      - name: Start Appium server
        run: |
          appium --log results/appium.log &
          timeout 60 bash -c 'until curl -s http://localhost:4723/status > /dev/null; do sleep 3; done'
          echo "Appium is ready."

      # ── Run tests ────────────────────────────────────────────────────────────
      - name: Run smoke tests on iOS simulator
        run: |
          python3 -m robot \
            --variable PLATFORM:ios \
            --variable IOS_CONFIG_FILE:config/ci_ios_capabilities.yaml \
            --include smoke \
            --outputdir results/smoke_ios \
            --log    log.html \
            --report report.html \
            --output output.xml \
            --loglevel INFO \
            tests/

      # ── Artefacts ────────────────────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-smoke-results-${{ github.run_number }}
          path: |
            results/smoke_ios/
            results/appium.log
          retention-days: 14

      # ── Job summary ──────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## iOS Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os

          report = "results/smoke_ios/output.xml"
          if not os.path.exists(report):
            print("output.xml not found — tests may not have started.")
          else:
            root = ET.parse(report).getroot()
            stats = root.find(".//statistics/total/stat")
            if stats is not None:
              passed = stats.get("pass", "0")
              failed = stats.get("fail", "0")
              total  = int(passed) + int(failed)
              emoji  = "✅" if failed == "0" else "❌"
              print(f"{emoji} **{passed}/{total} tests passed**")
          EOF
