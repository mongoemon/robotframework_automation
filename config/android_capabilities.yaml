# ─────────────────────────────────────────────────────────────────────────────
# Appium Desired Capabilities — Android
#
# HOW TO USE:
#   1. Replace every value marked with "CHANGE ME" with your actual app info.
#   2. Find appPackage + appActivity by running:
#        adb shell dumpsys window | grep -E 'mCurrentFocus|mFocusedApp'
#      while your app is open on the device.
#   3. Run 'adb devices' to confirm deviceName.
#
# Reference:
#   https://appium.io/docs/en/2.0/guides/caps/
#   https://github.com/appium/appium-uiautomator2-driver#capabilities
# ─────────────────────────────────────────────────────────────────────────────

capabilities:

  # ── Platform ──────────────────────────────────────────────────────────────
  platformName: Android
  # Android 16 (Baklava) — API level 36
  # Verify with: adb shell getprop ro.build.version.release
  platformVersion: "16"

  # ── Device ────────────────────────────────────────────────────────────────
  # Serial shown by: adb devices
  # Model: sdk_gphone64_x86_64  (Google Play emulator, x86_64)
  deviceName: "emulator-5554"

  # ── App Identification ────────────────────────────────────────────────────
  # SauceLabs My Demo App v2.2.0 (mda-2.2.0-25.apk)
  # Install once with: adb install -r apps/android/mda-2.2.0-25.apk
  appPackage: "com.saucelabs.mydemoapp.android"
  appActivity: "com.saucelabs.mydemoapp.android.view.activities.SplashActivity"

  # ── Automation Engine ─────────────────────────────────────────────────────
  # UiAutomator2 v4.2.4 — the recommended driver for Android (Appium 2.x).
  # Install once with: appium driver install uiautomator2
  automationName: UiAutomator2

  # ── Session Behavior ──────────────────────────────────────────────────────
  # false = app state is reset between sessions (fresh install behaviour).
  # Set to true only if tests explicitly manage their own state.
  noReset: false

  # false = Appium may reinstall the app; set true to skip reinstall for faster startup.
  fullReset: false

  # Seconds Appium waits for a new command before closing the session.
  newCommandTimeout: 300

  # ── App Binary (optional) ─────────────────────────────────────────────────
  # Uncomment and set an absolute path to have Appium install the APK automatically.
  # If the app is already installed, leave this commented out.
  # app: "C:/work/mobile/robotframework_automation/apps/android/mda-2.2.0-25.apk"

  # ── Language / Locale ─────────────────────────────────────────────────────
  # Force a specific language/locale so tests are language-independent.
  # language: "en"
  # locale: "US"

  # ── Performance / Logging ─────────────────────────────────────────────────
  # Skip device animations — speeds up tests significantly.
  disableWindowAnimation: true

  # Uncomment to print page source when element lookup fails (verbose, useful for debugging).
  # printPageSourceOnFindFailure: true

  # ── Timeouts ──────────────────────────────────────────────────────────────
  # How long UiAutomator2 waits for elements to appear (milliseconds).
  uiautomator2ServerLaunchTimeout: 60000
  uiautomator2ServerInstallTimeout: 60000

# ─────────────────────────────────────────────────────────────────────────────
# Appium Server URL
# Default: http://localhost:4723
# Override with the APPIUM_URL environment variable or common_variables.robot.
# ─────────────────────────────────────────────────────────────────────────────
appium_server:
  url: "http://localhost:4723"
